modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ae2"
type="required"
versionRange="[19.2.17,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="jei"
type="required"
versionRange="[19.21.0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="emi"
type="optional"
versionRange="[1.1.23,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="wcwt"
type="optional"
versionRange="[0.0.1,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="extendedae"
type="optional"
versionRange="[1.0,)"
ordering="AFTER"
side="BOTH"

[[mixins]]
config="ae2utility.mixins.json"

[[accessTransformers]]
file="META-INF/accesstransformer.cfg"
